name: Check yt-dlp compatibility

on:
  schedule:
    - cron: "23 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  youtube:
    name: Public YouTube fixture
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install the yt-dlp compatibility baseline
        run: |
          python -m pip install --upgrade pip
          yt_dlp_version=$(python -c 'from syncmymoodle.constants import YT_DLP_TESTED_VERSION; print(YT_DLP_TESTED_VERSION)')
          python -m pip install "yt-dlp[default]==${yt_dlp_version}"

      - name: Check the public yt-dlp test video
        run: |
          python - <<'PY'
          from importlib.metadata import version

          import yt_dlp

          from syncmymoodle.constants import YT_DLP_TESTED_VERSION

          installed_version = version("yt-dlp")
          if installed_version != YT_DLP_TESTED_VERSION:
              raise SystemExit(
                  f"expected yt-dlp {YT_DLP_TESTED_VERSION}, got {installed_version}"
              )

          # This is yt-dlp's current primary public YouTube fixture.
          video_id = "YE7VzlLtp-4"
          url = f"https://www.youtube.com/watch?v={video_id}"
          options = {
              "js_runtimes": {"deno": {}},
              "noplaylist": True,
              "quiet": True,
              "skip_download": True,
          }
          with yt_dlp.YoutubeDL(options) as ydl:
              info = ydl.extract_info(url, download=False)
          if info is None or info.get("id") != video_id or not info.get("formats"):
              raise SystemExit("yt-dlp did not return formats for the public fixture")
          print(f"yt-dlp {installed_version}: extracted {video_id}")
          PY
